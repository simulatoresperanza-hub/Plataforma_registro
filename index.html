<!-- PARA QUE SE VALIDE EN TODOS LOS NAVEGADORES -->
<script> 
  const edadInput = document.getElementById('edad');
  const edadError = document.getElementById('edadError');

  edadInput.addEventListener('input', () => {
    const valor = parseInt(edadInput.value);

    if (isNaN(valor)) {
      edadError.style.display = 'none';
      edadInput.setCustomValidity('');
      return;
    }

    if (valor < 0 || valor > 120) {
      edadError.textContent = '⚠️ Edad fuera de rango (debe estar entre 0 y 120 años).';
      edadError.style.display = 'inline';
      edadInput.setCustomValidity('Edad inválida');
    } else {
      edadError.style.display = 'none';
      edadInput.setCustomValidity('');
    }
  });
</script>

<!-- SIRVE PARA VALIDAR LA FECHA DE NACIMIENTO QUE SE ENCUENTRE DENTRO DE LOS RANGLOS PREESTABLECIDOS -->
<script> 
  const fechaInput = document.getElementById('fechaNacimiento');
  const errorFecha = document.getElementById('errorFecha');

  fechaInput.addEventListener('change', () => {
    const valor = fechaInput.value;
    if (!valor) {
      errorFecha.style.display = 'none';
      fechaInput.setCustomValidity('');
      return;
    }

    const fecha = new Date(valor);
    const minFecha = new Date('1900-01-01');
    const maxFecha = new Date('2026-12-31');

    if (fecha < minFecha || fecha > maxFecha) {
      errorFecha.textContent = 'Fecha inválida. Debe estar entre 01/01/1900 y 31/12/2026.';
      errorFecha.style.display = 'inline';
      fechaInput.setCustomValidity('Fecha inválida');
    } else {
      errorFecha.style.display = 'none';
      fechaInput.setCustomValidity('');
    }
  });
</script>
